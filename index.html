<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinica Assenteisti Poker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{margin:0;font-family:Inter;background:#0f172a;color:#e5e7eb}
h1{text-align:center;margin:10px}
.container{max-width:1100px;margin:auto;padding:16px}
.card{background:#020617;border-radius:16px;padding:16px;margin-bottom:20px}
.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.player{text-align:center;border:1px solid #1e293b;border-radius:14px;padding:10px}
.player img{width:70px;height:70px;border-radius:50%;object-fit:cover}
.player input{width:70px;padding:6px;border-radius:8px;border:none;margin-top:6px;text-align:center}
button{border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer}
.green{background:#22c55e;color:#022c22}
.red{background:#ef4444;color:#fff}
.gray{background:#334155;color:#e5e7eb}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;text-align:center}
th{background:#020617}
tr:nth-child(even){background:#020617}
.pos{color:#22c55e;font-weight:700}
.neg{color:#ef4444;font-weight:700}
.hidden{position:absolute;left:-9999px;top:-9999px;width:1000px;background:#020617;padding:20px}
.logo{width:140px;display:block;margin:0 auto 10px}
select{padding:6px;border-radius:8px}
</style>
</head>

<body>

<img src="logo.jpg" class="logo">
<h1>♠ Clinica Assenteisti Poker</h1>

<div class="container">

<!-- NUOVA PARTITA -->
<div class="card">
<h3>Nuova partita</h3>
<div class="players" id="players"></div><br>
<button class="green" onclick="saveGame()">Salva partita</button>
</div>

<!-- CLASSIFICA -->
<div class="card">
<h3>Classifica generale</h3>
<table id="ranking"></table>
</div>

<!-- PARTITE -->
<div class="card">
<h3>Partite registrate</h3>
<table id="gamesTable"></table>
</div>

<!-- STATISTICHE -->
<div class="card">
<h3>📊 Statistiche</h3>
<select id="statsFilter" onchange="renderStats()">
<option value="ALL">Tutti</option>
</select>
<div id="stats"></div>
</div>

<!-- EXPORT -->
<div class="card">
<h3>📤 Condivisione</h3>
<button class="gray" onclick="exportLast()">📸 Ultima partita</button>
<button class="gray" onclick="exportAll()">📊 Storico completo</button>
</div>

</div>

<!-- EXPORT ULTIMA -->
<div id="exportLastArea" class="hidden">
<img src="logo.jpg" class="logo">
<h2>Ultima partita</h2>
<div id="exportLastResults"></div>
<h3 id="exportAwards"></h3>
<h2>Classifica generale</h2>
<table id="exportRanking"></table>
</div>

<!-- EXPORT TUTTE -->
<div id="exportAllArea" class="hidden">
<img src="logo.jpg" class="logo">
<h2>Storico partite</h2>
<table id="exportGames"></table>
</div>

<script>
const players=[
 {name:"Chirurgo",img:"chirurgo.jpg"},
 {name:"Professore",img:"professore.jpg"},
 {name:"Barellista",img:"barellista.jpg"},
 {name:"Anestesista",img:"anestesista.png.jpg"},
 {name:"Radiografo",img:"radiografo.jpg"},
 {name:"Caposala",img:"caposala.jpg"}
];

let games = JSON.parse(localStorage.getItem("games") || "[]");

players.forEach(p=>{
 let o=document.createElement("option");
 o.value=p.name;o.textContent=p.name;
 statsFilter.appendChild(o);
});

function renderPlayers(){
 playersDiv.innerHTML="";
 players.forEach(p=>{
  playersDiv.innerHTML+=`
  <div class="player">
   <img src="${p.img}">
   <div>${p.name}</div>
   <input type="number" value="0" id="inp-${p.name}">
  </div>`;
 });
}

function saveGame(){
 let g={date:new Date().toLocaleString(),scores:{}};
 players.forEach(p=>g.scores[p.name]=Number(document.getElementById("inp-"+p.name).value)||0);
 games.push(g);
 localStorage.setItem("games",JSON.stringify(games));
 renderAll();
}

function totals(){
 let t={};players.forEach(p=>t[p.name]=0);
 games.forEach(g=>players.forEach(p=>t[p.name]+=g.scores[p.name]));
 return t;
}

function renderRanking(){
 let t=totals();
 let html=`<tr>${players.map(p=>`<th>${p.name}</th>`).join("")}</tr><tr>`;
 players.forEach(p=>{
  let v=t[p.name];
  html+=`<td class="${v>=0?'pos':'neg'}">${v}</td>`;
 });
 html+="</tr>";
 ranking.innerHTML=html;
 exportRanking.innerHTML=html;
}

function renderGames(){
 let html=`<tr><th>Data</th>${players.map(p=>`<th>${p.name}</th>`).join("")}<th></th></tr>`;
 games.forEach((g,i)=>{
  html+=`<tr><td>${g.date}</td>`;
  players.forEach(p=>html+=`<td>${g.scores[p.name]}</td>`);
  html+=`<td><button class="red" onclick="delGame(${i})">X</button></td></tr>`;
 });
 gamesTable.innerHTML=html;
 exportGames.innerHTML=html.replace(/<button.*?<\/button>/g,"");
}

function renderStats(){
 let f=statsFilter.value;
 let html="";
 players.forEach(p=>{
  if(f!=="ALL" && f!==p.name) return;
  let vals=games.map(g=>g.scores[p.name]);
  if(!vals.length) return;
  let tot=vals.reduce((a,b)=>a+b,0);
  html+=`<p><b>${p.name}</b> → Totale: <span class="${tot>=0?'pos':'neg'}">${tot}</span>,
  Media: ${(tot/vals.length).toFixed(1)},
  Migliore: ${Math.max(...vals)},
  Peggiore: ${Math.min(...vals)},
  Partite: ${vals.length}</p>`;
 });
 stats.innerHTML=html;
}

function exportLast(){
 if(!games.length)return;
 let g=games[games.length-1];
 let best=players.reduce((a,b)=>g.scores[a.name]>g.scores[b.name]?a:b);
 let worst=players.reduce((a,b)=>g.scores[a.name]<g.scores[b.name]?a:b);

 exportLastResults.innerHTML=players.map(p=>{
  let v=g.scores[p.name];
  return `<p>${p.name}: <b class="${v>=0?'pos':'neg'}">${v}</b></p>`;
 }).join("");

 exportAwards.innerHTML=`🏆 Miglior: ${best.name} | 💀 Peggior: ${worst.name}`;

 html2canvas(exportLastArea).then(c=>{
  let a=document.createElement("a");
  a.download="report_ultima_partita.png";
  a.href=c.toDataURL();
  a.click();
 });
}

function exportAll(){
 html2canvas(exportAllArea).then(c=>{
  let a=document.createElement("a");
  a.download="storico_partite.png";
  a.href=c.toDataURL();
  a.click();
 });
}

function delGame(i){
 games.splice(i,1);
 localStorage.setItem("games",JSON.stringify(games));
 renderAll();
}

function renderAll(){
 renderRanking();
 renderGames();
 renderStats();
}

renderPlayers();
renderAll();
</script>
</body>
</html>
