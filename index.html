<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Clinica Assenteisti – Poker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  background:#0f172a;
  color:#e5e7eb;
  font-family:Arial,sans-serif;
  max-width:1200px;
  margin:auto;
  padding:20px;
}
h1,h2{text-align:center}
.logo{display:block;margin:0 auto 10px;max-width:180px}

button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  margin:4px;
}
.save{background:#22c55e;color:#000}
.export{background:#38bdf8;color:#000}

.players{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:10px;
}
.player{
  background:#020617;
  border:1px solid #334155;
  border-radius:8px;
  padding:8px;
  text-align:center;
}
.player img{
  width:60px;height:60px;
  border-radius:50%;object-fit:cover
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  font-size:14px;
}
th,td{
  border:1px solid #334155;
  padding:6px;
  text-align:center;
}
th{background:#1e293b}
.pos{color:#22c55e;font-weight:bold}
.neg{color:#ef4444;font-weight:bold}
.neu{color:#eab308;font-weight:bold}
select{padding:6px}

/* area export */
.export-area{
  background:#0f172a;
  padding:20px;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">
<h1>Clinica Assenteisti</h1>

<h2>Nuova partita</h2>

<div class="players" id="players"></div>

<div style="text-align:center">
  <button class="save" onclick="saveGame()">Salva partita</button>
</div>

<h2>Classifica generale</h2>
<div id="ranking"></div>

<h2>Partite (vista tabellare)</h2>
<div id="gamesTable"></div>

<div style="text-align:center">
  <button class="export" onclick="exportLast()">📸 Export ultima partita</button>
  <button class="export" onclick="exportAll()">📸 Export tutte le partite</button>
</div>

<h2>Statistiche</h2>

<div style="text-align:center">
  Seleziona giocatore:
  <select id="playerFilter" onchange="renderStats()">
    <option value="all">Tutti</option>
  </select>
</div>

<div id="stats"></div>

<!-- AREA NASCOSTA PER EXPORT -->
<div id="exportBox" class="export-area" style="display:none"></div>

<script>
const players=[
 {name:"Anestesista",img:"anestesista.png.jpg"},
 {name:"Chirurgo",img:"chirurgo.jpg"},
 {name:"Barellista",img:"barellista.jpg"},
 {name:"Caposala",img:"caposala.jpg"},
 {name:"Radiografo",img:"radiografo.jpg"},
 {name:"Professore",img:"professore.jpg"}
];

const box=document.getElementById("players");
const filter=document.getElementById("playerFilter");

players.forEach(p=>{
  box.innerHTML+=`
  <div class="player" data-name="${p.name}">
    <img src="${p.img}">
    <div><b>${p.name}</b></div>
    <label><input type="checkbox" class="present"> Presente</label>
    <input type="number" class="score" value="0">
  </div>`;
  filter.innerHTML+=`<option value="${p.name}">${p.name}</option>`;
});

let games=JSON.parse(localStorage.getItem("games")||"[]");

function saveGame(){
  const g={date:new Date().toLocaleString(),players:{}};
  document.querySelectorAll(".player").forEach(p=>{
    const name=p.dataset.name;
    const pres=p.querySelector(".present").checked;
    const sc=Number(p.querySelector(".score").value||0);
    g.players[name]={present:pres,score:pres?sc:null};
  });
  games.push(g);
  localStorage.setItem("games",JSON.stringify(games));
  alert("✅ Partita salvata");
  renderAll();
}

function renderRankingHTML(){
  const tot={}; players.forEach(p=>tot[p.name]=0);
  games.forEach(g=>{
    for(const n in g.players)
      if(g.players[n].present) tot[n]+=g.players[n].score;
  });
  const sorted=Object.entries(tot).sort((a,b)=>b[1]-a[1]);
  let h="<table><tr><th>Giocatore</th><th>Totale</th></tr>";
  sorted.forEach(([n,v])=>{
    h+=`<tr><td>${n}</td><td class="${v>0?'pos':v<0?'neg':'neu'}">${v}</td></tr>`;
  });
  h+="</table>";
  return h;
}

function renderRanking(){
  ranking.innerHTML=renderRankingHTML();
}

function renderGamesTableHTML(){
  let h="<table><tr><th>Giocatore</th>";
  games.forEach((g,i)=>h+=`<th>P${i+1}</th>`);
  h+="</tr>";
  players.forEach(p=>{
    h+=`<tr><td>${p.name}</td>`;
    games.forEach(g=>{
      const d=g.players[p.name];
      if(!d||!d.present) h+="<td>—</td>";
      else h+=`<td class="${d.score>0?'pos':d.score<0?'neg':'neu'}">${d.score}</td>`;
    });
    h+="</tr>";
  });
  h+="</table>";
  return h;
}

function renderGamesTable(){
  gamesTable.innerHTML=renderGamesTableHTML();
}

function renderStats(){
  const sel=playerFilter.value;
  let html="";
  if(sel==="all"){
    let best=null,worst=null;
    games.forEach(g=>{
      let sum=0,played=false;
      for(const p in g.players)
        if(g.players[p].present){sum+=g.players[p].score;played=true;}
      if(played){
        if(!best||sum>best.v) best={v:sum};
        if(!worst||sum<worst.v) worst={v:sum};
      }
    });
    html=`🟢 Migliore serata: <b>${best?best.v:"—"}</b><br>
          🔴 Peggiore serata: <b>${worst?worst.v:"—"}</b>`;
  }else{
    let tot=0,count=0,best=null,worst=null;
    games.forEach(g=>{
      const d=g.players[sel];
      if(d&&d.present){
        tot+=d.score;count++;
        if(best===null||d.score>best)best=d.score;
        if(worst===null||d.score<worst)worst=d.score;
      }
    });
    html=`<b>${sel}</b><br>
          Totale: <span class="${tot>0?'pos':tot<0?'neg':'neu'}">${tot}</span><br>
          Media: ${count?(tot/count).toFixed(1):"—"}<br>
          Migliore: ${best??"—"}<br>
          Peggiore: ${worst??"—"}`;
  }
  stats.innerHTML=html;
}

function exportPNG(filename,contentHTML){
  const box=document.getElementById("exportBox");
  box.innerHTML=`<img src="logo.png" class="logo">${contentHTML}`;
  box.style.display="block";

  html2canvas(box,{backgroundColor:"#0f172a"}).then(canvas=>{
    const link=document.createElement("a");
    link.download=filename;
    link.href=canvas.toDataURL("image/png");
    link.click();
    box.style.display="none";
  });
}

function exportLast(){
  if(!games.length)return alert("Nessuna partita");
  exportPNG(
    "ultima_partita.png",
    "<h2>Ultima partita</h2>"+renderRankingHTML()
  );
}

function exportAll(){
  exportPNG(
    "tutte_le_partite.png",
    "<h2>Tutte le partite</h2>"+renderGamesTableHTML()
  );
}

function renderAll(){
  renderRanking();
  renderGamesTable();
  renderStats();
}

renderAll();
</script>

</body>
</html>
