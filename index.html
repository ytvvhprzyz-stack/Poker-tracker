<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Clinica Assenteisti – Poker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  background:#0f172a;
  color:#e5e7eb;
  font-family:Arial,sans-serif;
  max-width:1200px;
  margin:auto;
  padding:20px;
}
h1,h2{text-align:center}
.logo{display:block;margin:0 auto 10px;max-width:160px}

button{
  padding:5px 8px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  margin:2px;
}
.save{background:#22c55e;color:#000}
.edit{background:#eab308;color:#000}
.del{background:#ef4444;color:#fff}
.export{background:#38bdf8;color:#000}

.players{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:8px;
}
.player{
  background:#020617;
  border:1px solid #334155;
  border-radius:8px;
  padding:6px;
  text-align:center;
}
.player img{
  width:50px;height:50px;
  border-radius:50%;object-fit:cover
}

.table-wrap{overflow-x:auto}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
  font-size:11px;
}
th,td{
  border:1px solid #334155;
  padding:3px 4px;
  text-align:center;
  white-space:nowrap;
}
th{background:#1e293b}

.pos{color:#22c55e;font-weight:bold}
.neg{color:#ef4444;font-weight:bold}
.neu{color:#eab308;font-weight:bold}
.absent{
  background:#020617;
  color:#64748b;
  font-style:italic;
}

.badge{
  background:#facc15;
  color:#000;
  font-size:10px;
  padding:2px 5px;
  border-radius:6px;
  margin-left:4px;
}

.export-area{
  background:#0f172a;
  padding:10px;
  font-size:11px;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">
<h1>Clinica Assenteisti</h1>

<h2>Nuova partita</h2>
<div class="players" id="players"></div>

<div style="text-align:center">
  <button class="save" onclick="saveGame()">Salva partita</button>
</div>

<h2>Classifica generale</h2>
<div id="ranking"></div>

<h2>Statistiche</h2>
<div style="text-align:center">
  Giocatore:
  <select id="playerFilter" onchange="renderStats()">
    <option value="all">Tutti</option>
  </select>
</div>
<div id="stats"></div>

<h2>Partite registrate</h2>
<div class="table-wrap" id="gamesTable"></div>

<div style="text-align:center">
  <button class="export" onclick="exportLast()">📸 Ultima partita</button>
  <button class="export" onclick="exportAll()">📸 Tutte le partite</button>
</div>

<div id="exportBox" class="export-area" style="display:none"></div>

<script>
const players=[
 {name:"Anestesista",img:"anestesista.png.jpg"},
 {name:"Chirurgo",img:"chirurgo.jpg"},
 {name:"Barellista",img:"barellista.jpg"},
 {name:"Professore",img:"professore.jpg"},
 {name:"Caposala",img:"caposala.jpg"},
 {name:"Radiografo",img:"radiografo.jpg"}
];

const box=document.getElementById("players");
const filter=document.getElementById("playerFilter");

players.forEach(p=>{
 box.innerHTML+=`
 <div class="player" data-name="${p.name}">
  <img src="${p.img}">
  <div><b>${p.name}</b></div>
  <label><input type="checkbox" class="present"> Presente</label>
  <input type="number" class="score" value="0">
 </div>`;
 filter.innerHTML+=`<option value="${p.name}">${p.name}</option>`;
});

let games=JSON.parse(localStorage.getItem("games")||"[]");
let editIndex=null;

function saveGame(){
 const g={date:new Date().toLocaleString(),players:{}};
 document.querySelectorAll(".player").forEach(p=>{
  const n=p.dataset.name;
  const pr=p.querySelector(".present").checked;
  const sc=Number(p.querySelector(".score").value||0);
  g.players[n]={present:pr,score:pr?sc:null};
 });

 if(editIndex!==null){
  games[editIndex]=g;
  editIndex=null;
 }else{
  games.push(g);
 }

 localStorage.setItem("games",JSON.stringify(games));
 renderAll();
}

function getWinner(game){
 let w=null;
 for(const p in game.players){
  const d=game.players[p];
  if(d.present && (!w || d.score>w.score))
   w={name:p,score:d.score};
 }
 return w;
}

function renderGamesTable(){
 let h="<table><tr><th>#</th>";
 players.forEach(p=>h+=`<th>${p.name}</th>`);
 h+="<th>Azioni</th></tr>";

 games.forEach((g,i)=>{
  const winner=getWinner(g);
  h+=`<tr><td>${i+1}</td>`;
  players.forEach(p=>{
   const d=g.players[p.name];
   if(!d||!d.present){
    h+=`<td class="absent">ASSENTE</td>`;
   }else{
    h+=`<td class="${d.score>0?'pos':d.score<0?'neg':'neu'}">
          ${d.score}${winner&&winner.name===p.name?'<span class="badge">🏆</span>':''}
        </td>`;
   }
  });
  h+=`<td>
        <button class="edit" onclick="editGame(${i})">✏️</button>
        <button class="del" onclick="deleteGame(${i})">❌</button>
       </td></tr>`;
 });
 gamesTable.innerHTML=h+"</table>";
}

function editGame(i){
 const g=games[i];
 document.querySelectorAll(".player").forEach(p=>{
  const d=g.players[p.dataset.name];
  p.querySelector(".present").checked=d.present;
  p.querySelector(".score").value=d.score||0;
 });
 editIndex=i;
 window.scrollTo({top:0,behavior:"smooth"});
}

function deleteGame(i){
 if(confirm("Eliminare la partita?")){
  games.splice(i,1);
  localStorage.setItem("games",JSON.stringify(games));
  renderAll();
 }
}

function exportPNG(name,node){
 const box=document.getElementById("exportBox");
 box.innerHTML=`<img src="logo.png" class="logo">`;
 box.appendChild(node);
 box.style.display="block";

 const w=node.scrollWidth;
 html2canvas(box,{scale:2,width:w,windowWidth:w}).then(c=>{
  const a=document.createElement("a");
  a.download=name;
  a.href=c.toDataURL("image/png");
  a.click();
  box.style.display="none";
 });
}

function exportLast(){
 if(!games.length)return;
 const wrap=document.createElement("div");
 wrap.innerHTML="<h2>Ultima partita</h2>"+gamesTable.innerHTML+"<h2>Classifica generale</h2>"+ranking.innerHTML;
 exportPNG("ultima_partita.png",wrap);
}

function exportAll(){
 const clone=document.getElementById("gamesTable").cloneNode(true);
 clone.style.width="max-content";
 exportPNG("tutte_le_partite.png",clone);
}

function renderRanking(){
 const tot={}; players.forEach(p=>tot[p.name]=0);
 games.forEach(g=>{
  for(const n in g.players)
   if(g.players[n].present) tot[n]+=g.players[n].score;
 });
 const sorted=Object.entries(tot).sort((a,b)=>b[1]-a[1]);
 let h="<table><tr><th>Giocatore</th><th>Totale</th></tr>";
 sorted.forEach(([n,v])=>{
  h+=`<tr><td>${n}</td><td class="${v>0?'pos':v<0?'neg':'neu'}">${v}</td></tr>`;
 });
 ranking.innerHTML=h+"</table>";
}

function renderStats(){
 let best={v:-Infinity},worst={v:Infinity};
 games.forEach(g=>{
  for(const p in g.players){
   const d=g.players[p];
   if(d.present){
    if(d.score>best.v) best={n:p,v:d.score};
    if(d.score<worst.v) worst={n:p,v:d.score};
   }
  }
 });
 stats.innerHTML=`🟢 Miglior serata: <b>${best.n||"—"} +${best.v||0}</b><br>
                   🔴 Peggior serata: <b>${worst.n||"—"} ${worst.v||0}</b>`;
}

function renderAll(){
 renderRanking();
 renderStats();
 renderGamesTable();
}

renderAll();
</script>

</body>
</html>
