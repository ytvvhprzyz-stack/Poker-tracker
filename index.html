<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinica Assenteisti Poker</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#e5e7eb}
.container{max-width:1000px;margin:auto;padding:16px}
.card{background:#020617;border-radius:14px;padding:16px;margin-bottom:20px}
.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.player{border:1px solid #1e293b;border-radius:12px;padding:10px;text-align:center}
.player img{width:60px;height:60px;border-radius:50%;object-fit:cover}
.player input[type="number"]{width:70px;margin-top:6px;padding:4px;text-align:center}
button{padding:8px 14px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.green{background:#22c55e;color:#022c22}
.red{background:#ef4444;color:white}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;text-align:center}
th{background:#020617}
tr:nth-child(even){background:#020617}
.pos{color:#22c55e;font-weight:bold}
.neg{color:#ef4444;font-weight:bold}
</style>
</head>

<body>
<div class="container">

<h2>♠ Clinica Assenteisti Poker</h2>

<!-- NUOVA PARTITA -->
<div class="card">
<h3>Nuova partita</h3>
<div class="players" id="players"></div><br>
<button class="green" onclick="saveGame()">Salva partita</button>
</div>

<!-- CLASSIFICA -->
<div class="card">
<h3>Classifica generale</h3>
<table id="ranking"></table>
</div>

<!-- PARTITE -->
<div class="card">
<h3>Partite registrate</h3>
<table id="games"></table>
</div>

<!-- STATISTICHE -->
<div class="card">
<h3>Statistiche</h3>
<select id="statsFilter" onchange="renderStats()">
<option value="ALL">Tutti</option>
</select>
<div id="stats"></div>
</div>

</div>

<script>
const players = [
 {name:"Chirurgo", img:"chirurgo.jpg"},
 {name:"Professore", img:"professore.jpg"},
 {name:"Barellista", img:"barellista.jpg"},
 {name:"Anestesista", img:"anestesista.jpg"},
 {name:"Radiografo", img:"radiografo.jpg"},
 {name:"Caposala", img:"caposala.jpg"}
];

let games = JSON.parse(localStorage.getItem("games") || "[]");

const playersDiv = document.getElementById("players");
const rankingTable = document.getElementById("ranking");
const gamesTable = document.getElementById("games");
const statsDiv = document.getElementById("stats");
const statsFilter = document.getElementById("statsFilter");

players.forEach(p=>{
 let o=document.createElement("option");
 o.value=p.name;o.textContent=p.name;
 statsFilter.appendChild(o);
});

function renderPlayers(){
 playersDiv.innerHTML="";
 players.forEach(p=>{
  playersDiv.innerHTML+=`
  <div class="player">
   <img src="${p.img}"><br>
   <b>${p.name}</b><br>
   <label>
    <input type="checkbox" id="chk-${p.name}" onchange="toggleInput('${p.name}')"> Presente
   </label><br>
   <input type="number" id="inp-${p.name}" disabled value="0">
  </div>`;
 });
}

function toggleInput(name){
 document.getElementById("inp-"+name).disabled =
 !document.getElementById("chk-"+name).checked;
}

function saveGame(){
 let g={date:new Date().toLocaleString(),players:{}};
 players.forEach(p=>{
  let present=document.getElementById("chk-"+p.name).checked;
  if(present){
   g.players[p.name]={present:true,score:Number(document.getElementById("inp-"+p.name).value)||0};
  } else {
   g.players[p.name]={present:false};
  }
 });
 games.push(g);
 localStorage.setItem("games",JSON.stringify(games));
 renderAll();
}

function renderRanking(){
 let totals={};players.forEach(p=>totals[p.name]=0);
 games.forEach(g=>{
  players.forEach(p=>{
   if(g.players[p.name].present){
    totals[p.name]+=g.players[p.name].score;
   }
  });
 });
 let html="<tr>"+players.map(p=>`<th>${p.name}</th>`).join("")+"</tr><tr>";
 players.forEach(p=>{
  let v=totals[p.name];
  html+=`<td class="${v>=0?'pos':'neg'}">${v}</td>`;
 });
 html+="</tr>";
 rankingTable.innerHTML=html;
}

function renderGames(){
 let html="<tr><th>Data</th>"+players.map(p=>`<th>${p.name}</th>`).join("")+"<th></th></tr>";
 games.forEach((g,i)=>{
  html+=`<tr><td>${g.date}</td>`;
  players.forEach(p=>{
   if(g.players[p.name].present){
    html+=`<td>${g.players[p.name].score}</td>`;
   } else {
    html+=`<td>-</td>`;
   }
  });
  html+=`<td><button class="red" onclick="delGame(${i})">X</button></td></tr>`;
 });
 gamesTable.innerHTML=html;
}

function renderStats(){
 let f=statsFilter.value;
 let html="";
 players.forEach(p=>{
  if(f!=="ALL" && f!==p.name) return;
  let vals=[];
  games.forEach(g=>{
   if(g.players[p.name].present){
    vals.push(g.players[p.name].score);
   }
  });
  if(!vals.length) return;
  let tot=vals.reduce((a,b)=>a+b,0);
  html+=`<p><b>${p.name}</b> → Totale: <span class="${tot>=0?'pos':'neg'}">${tot}</span>,
  Media: ${(tot/vals.length).toFixed(1)},
  Migliore: ${Math.max(...vals)},
  Peggiore: ${Math.min(...vals)},
  Partite: ${vals.length}</p>`;
 });
 statsDiv.innerHTML=html;
}

function delGame(i){
 games.splice(i,1);
 localStorage.setItem("games",JSON.stringify(games));
 renderAll();
}

function renderAll(){
 renderRanking();
 renderGames();
 renderStats();
}

renderPlayers();
renderAll();
</script>
</body>
</html>
