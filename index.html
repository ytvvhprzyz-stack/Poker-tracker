<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Clinica Assenteisti Poker</title>

<style>

body{
background:linear-gradient(180deg,#020617,#0f172a);
color:white;
font-family:system-ui;
max-width:1100px;
margin:auto;
padding:20px
}

h1{text-align:center}

.logo{
display:block;
margin:auto;
width:140px;
margin-bottom:10px
}

.card{
background:#020617;
border:1px solid #334155;
border-radius:12px;
padding:15px;
margin-bottom:20px
}

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px
}

.player{
background:#020617;
border:1px solid #334155;
border-radius:10px;
padding:10px;
text-align:center
}

.player img{
width:55px;
height:55px;
border-radius:50%;
object-fit:cover;
margin-bottom:5px
}

.player input{
width:80px;
padding:6px;
text-align:center;
border-radius:6px;
border:none;
font-size:16px
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin:5px
}

.save{background:#22c55e;color:black}
.copy{background:#3b82f6}

table{
width:100%;
border-collapse:collapse;
margin-top:10px
}

th{
background:#1e293b;
padding:6px
}

td{
padding:6px;
border-top:1px solid #334155;
text-align:center
}

.pos{color:#22c55e;font-weight:bold}
.neg{color:#ef4444;font-weight:bold}

.assente{
color:#64748b;
font-style:italic
}

</style>

</head>

<body>

<h1>Clinica Assenteisti</h1>

<div class="card">

<h2>Nuova partita</h2>

<div class="players" id="players"></div>

<div style="text-align:center;margin-top:15px">
<button class="save" onclick="saveGame()">Salva partita</button>
</div>

</div>

<div class="card">

<h2>Classifica generale</h2>

<button class="copy" onclick="copyRanking()">Copia classifica</button>

<div id="ranking"></div>

</div>

<div class="card">

<h2>Storico partite</h2>

<div id="gamesTable"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz9dd0kPsH9LfpysTBHAz3gKxCFt-i9s9Zpfmzxi0VDFGoxtiEmAGETy08owwyygNvs/exec"

const players=[
"Anestesista",
"Chirurgo",
"Barellista",
"Professore",
"Caposala",
"Radiografo"
]

const playersBox=document.getElementById("players")

players.forEach(p=>{

playersBox.innerHTML+=`

<div class="player" data-name="${p}">

<div><b>${p}</b></div>

<input type="number" class="score" placeholder="">

</div>

`

})

let games=[]

async function loadGames(){

try{

const res=await fetch(API)
const data=await res.json()

games=[]

data.forEach(r=>{

games.push({

date:r[1],

players:{
Anestesista:r[2]===""?null:Number(r[2]),
Chirurgo:r[3]===""?null:Number(r[3]),
Barellista:r[4]===""?null:Number(r[4]),
Professore:r[5]===""?null:Number(r[5]),
Caposala:r[6]===""?null:Number(r[6]),
Radiografo:r[7]===""?null:Number(r[7])
}

})

})

renderAll()

}catch(e){

alert("Errore caricamento dati")

}

}

async function saveGame(){

let g={}
let total=0
let presenti=0

document.querySelectorAll(".player").forEach(p=>{

const name=p.dataset.name
const v=p.querySelector("input").value

if(v===""){

g[name]=null

}else{

g[name]=Number(v)
total+=Number(v)
presenti++

}

})

if(presenti<2){

alert("Servono almeno 2 giocatori")

return

}

if(total!==0){

alert("La somma deve essere 0")

return

}

await fetch(API,{
method:"POST",
body:JSON.stringify(g)
})

document.querySelectorAll("input").forEach(i=>i.value="")

loadGames()

}

function renderRanking(){

let tot={}
players.forEach(p=>tot[p]=0)

games.forEach(g=>{

for(const n in g.players){

if(g.players[n]!==null){

tot[n]+=g.players[n]

}

}

})

let sorted=Object.entries(tot).sort((a,b)=>b[1]-a[1])

let html="<table><tr><th>Giocatore</th><th>Totale</th></tr>"

sorted.forEach(([n,v])=>{

html+=`<tr>
<td>${n}</td>
<td class="${v>=0?'pos':'neg'}">${v}</td>
</tr>`

})

html+="</table>"

ranking.innerHTML=html

}

function renderGames(){

let html="<table><tr><th>#</th>"

players.forEach(p=>html+=`<th>${p}</th>`)

html+="</tr>"

games.forEach((g,i)=>{

html+=`<tr><td>${i+1}</td>`

players.forEach(p=>{

let val=g.players[p]

if(val===null){

html+=`<td class="assente">ASSENTE</td>`

}else{

html+=`<td class="${val>=0?'pos':'neg'}">${val}</td>`

}

})

html+="</tr>"

})

html+="</table>"

gamesTable.innerHTML=html

}

function copyRanking(){

let text="Classifica Poker\n\n"

let tot={}
players.forEach(p=>tot[p]=0)

games.forEach(g=>{

for(const n in g.players){

if(g.players[n]!==null){

tot[n]+=g.players[n]

}

}

})

let sorted=Object.entries(tot).sort((a,b)=>b[1]-a[1])

sorted.forEach(([n,v],i)=>{

text+=`${i+1}. ${n} ${v}\n`

})

navigator.clipboard.writeText(text)

alert("Classifica copiata")

}

function renderAll(){

renderRanking()
renderGames()

}

loadGames()

</script>

</body>

</html>
