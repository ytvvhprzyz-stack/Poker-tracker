<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<title>Clinica Assenteisti – Poker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
background:#0f172a;
color:#e5e7eb;
font-family:Arial,sans-serif;
max-width:1200px;
margin:auto;
padding:20px
}

h1,h2{text-align:center}

.logo{
display:block;
margin:0 auto 10px;
max-width:160px
}

button{
padding:5px 8px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
margin:2px
}

.save{background:#22c55e;color:#000}
.edit{background:#eab308;color:#000}
.del{background:#ef4444;color:#fff}

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:8px
}

.player{
background:#020617;
border:1px solid #334155;
border-radius:8px;
padding:6px;
text-align:center
}

.player img{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover
}

table{
width:100%;
border-collapse:collapse;
margin-top:12px;
font-size:11px
}

th,td{
border:1px solid #334155;
padding:3px 4px;
text-align:center
}

th{background:#1e293b}

.pos{color:#22c55e;font-weight:bold}
.neg{color:#ef4444;font-weight:bold}
.neu{color:#eab308;font-weight:bold}

.absent{
background:#020617;
color:#64748b;
font-style:italic
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<h1>Clinica Assenteisti</h1>

<h2>Nuova partita</h2>

<div class="players" id="players"></div>

<div style="text-align:center">
<button class="save" onclick="saveGame()">Salva partita</button>
</div>

<h2>Classifica generale</h2>
<div id="ranking"></div>

<h2>Partite registrate</h2>
<div id="gamesTable"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbz9dd0kPsH9LfpysTBHAz3gKxCFt-i9s9Zpfmzxi0VDFGoxtiEmAGETy08owwyygNvs/exec"

const players=[

{name:"Anestesista",img:"anestesista.png.jpg"},
{name:"Chirurgo",img:"chirurgo.jpg"},
{name:"Barellista",img:"barellista.jpg"},
{name:"Professore",img:"professore.jpg"},
{name:"Caposala",img:"caposala.jpg"},
{name:"Radiografo",img:"radiografo.jpg"}

]

const box=document.getElementById("players")

players.forEach(p=>{

box.innerHTML+=`

<div class="player" data-name="${p.name}">

<img src="${p.img}">

<div><b>${p.name}</b></div>

<input type="number" class="score" placeholder="Risultato">

</div>

`

})

let games=[]

async function loadGames(){

const res=await fetch(API)

const data=await res.json()

games=[]

data.forEach(r=>{

games.push({

date:r[1],

players:{

Anestesista:{present:true,score:Number(r[2])},

Chirurgo:{present:true,score:Number(r[3])},

Barellista:{present:true,score:Number(r[4])},

Professore:{present:true,score:Number(r[5])},

Caposala:{present:true,score:Number(r[6])},

Radiografo:{present:true,score:Number(r[7])}

}

})

})

renderAll()

}

async function saveGame(){

const g={}

let total=0

document.querySelectorAll(".player").forEach(p=>{

const name=p.dataset.name

const v=p.querySelector(".score").value

if(v===""){

g[name]=0

}else{

g[name]=Number(v)

total+=Number(v)

}

})

if(total!==0){

alert("La somma deve essere 0")

return

}

await fetch(API,{

method:"POST",

body:JSON.stringify(g)

})

document.querySelectorAll(".score").forEach(i=>i.value="")

loadGames()

}

function renderRanking(){

const tot={}

players.forEach(p=>tot[p.name]=0)

games.forEach(g=>{

for(const n in g.players){

tot[n]+=g.players[n].score

}

})

const sorted=Object.entries(tot).sort((a,b)=>b[1]-a[1])

let h="<table><tr><th>Giocatore</th><th>Totale</th></tr>"

sorted.forEach(([n,v])=>{

h+=`<tr>

<td>${n}</td>

<td class="${v>0?'pos':v<0?'neg':'neu'}">${v}</td>

</tr>`

})

ranking.innerHTML=h+"</table>"

}

function renderGamesTable(){

let h="<table><tr><th>#</th>"

players.forEach(p=>h+=`<th>${p.name}</th>`)

h+="</tr>"

games.forEach((g,i)=>{

h+=`<tr><td>${i+1}</td>`

players.forEach(p=>{

const d=g.players[p.name]

h+=`<td class="${d.score>0?'pos':d.score<0?'neg':'neu'}">${d.score}</td>`

})

h+="</tr>"

})

gamesTable.innerHTML=h+"</table>"

}

function renderAll(){

renderRanking()

renderGamesTable()

}

loadGames()

</script>

</body>

</html>
