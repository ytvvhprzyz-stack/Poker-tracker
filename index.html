<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Poker Tracker – Clinica Assenteisti</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#0f172a;
  color:#e5e7eb;
}
h1,h2{ text-align:center }
.logo{
  display:block;
  margin:20px auto;
  max-width:180px;
}
.container{ max-width:1200px; margin:auto; padding:15px }

table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:20px;
  font-size:14px;
}
th,td{
  border:1px solid #334155;
  padding:6px;
  text-align:center;
}
th{ background:#1e293b }
tr.absent{ opacity:0.4 }
.pos{ color:#22c55e; font-weight:bold }
.neg{ color:#ef4444; font-weight:bold }

button{
  padding:8px 14px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}
button.danger{ background:#dc2626 }
button.secondary{ background:#475569 }

.badge{
  background:#22c55e;
  color:#052e16;
  padding:3px 8px;
  border-radius:10px;
  font-size:12px;
  margin-left:5px;
}

#exportBox{
  position:absolute;
  left:-9999px;
  top:0;
  background:#0f172a;
  color:white;
  padding:20px;
}
.small{ font-size:12px }
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="container">

<h1>Clinica Assenteisti – Poker Tracker</h1>

<h2>Nuova partita</h2>

<table id="inputTable">
<tr>
  <th>Giocatore</th>
  <th>Ha giocato</th>
  <th>Risultato</th>
</tr>
<script>
const players=[
 {n:"Anestesista",a:"anestesista.png.jpg"},
 {n:"Barellista",a:"barellista.jpg"},
 {n:"Caposala",a:"caposala.jpg"},
 {n:"Professore",a:"professore.jpg"},
 {n:"Chirurgo",a:"chirurgo.png"},
 {n:"Radiografo",a:"radiografo.jpg"}
];
players.forEach(p=>{
 document.write(`
 <tr class="player-row" data-name="${p.n}">
   <td>${p.n}</td>
   <td><input type="checkbox" class="present"></td>
   <td><input type="number" class="score" value="0"></td>
 </tr>
 `);
});
</script>
</table>

<button onclick="saveGame()">Salva partita</button>

<hr>

<h2>Partite registrate</h2>
<div style="overflow-x:auto">
<table id="gamesTable"></table>
</div>

<button onclick="exportLast()">Scarica ultima partita</button>
<button onclick="exportAll()">Scarica tutte le partite</button>

<hr>

<h2>Statistiche</h2>
<select id="playerFilter" onchange="renderStats()">
<option value="">Tutti</option>
</select>
<div id="stats"></div>

</div>

<div id="exportBox"></div>

<script>
function getGames(){
 return JSON.parse(localStorage.getItem("games")||"[]");
}
function saveGames(g){
 localStorage.setItem("games",JSON.stringify(g));
}

function saveGame(){
 try{
   let games=getGames();
   let game={date:new Date().toLocaleString(),players:{}};
   document.querySelectorAll(".player-row").forEach(r=>{
     const n=r.dataset.name;
     const p=r.querySelector(".present").checked;
     const v=Number(r.querySelector(".score").value||0);
     game.players[n]={present:p,score:p?v:null};
   });
   games.push(game);
   saveGames(games);
   alert("Partita salvata");
   render();
 }catch(e){ alert("Errore"); console.error(e); }
}

function render(){
 renderTable();
 renderStats();
}

function renderTable(){
 const g=getGames();
 let html="<tr><th>Data</th>";
 players.forEach(p=>html+=`<th>${p.n}</th>`);
 html+="<th>Azioni</th></tr>";

 g.forEach((game,i)=>{
   html+=`<tr><td>${game.date}</td>`;
   players.forEach(p=>{
     const d=game.players[p.n];
     if(!d || !d.present) html+=`<td class="absent">—</td>`;
     else html+=`<td class="${d.score>=0?"pos":"neg"}">${d.score}</td>`;
   });
   html+=`
   <td>
     <button class="secondary" onclick="editGame(${i})">Mod</button>
     <button class="danger" onclick="deleteGame(${i})">X</button>
   </td></tr>`;
 });
 document.getElementById("gamesTable").innerHTML=html;
}

function deleteGame(i){
 let g=getGames();
 g.splice(i,1);
 saveGames(g);
 render();
}

function editGame(i){
 const g=getGames()[i];
 document.querySelectorAll(".player-row").forEach(r=>{
   const d=g.players[r.dataset.name];
   r.querySelector(".present").checked=d.present;
   r.querySelector(".score").value=d.score||0;
 });
 deleteGame(i);
}

function renderStats(){
 const g=getGames();
 let best=null,worst=null;
 g.forEach(game=>{
   for(let p in game.players){
     const d=game.players[p];
     if(!d.present)continue;
     if(!best||d.score>best.s)best={p,s:d.score};
     if(!worst||d.score<worst.s)worst={p,s:d.score};
   }
 });
 let html="";
 if(best)html+=`<p>🏆 Miglior serata: ${best.p} +${best.s}</p>`;
 if(worst)html+=`<p>💀 Peggior serata: ${worst.p} ${worst.s}</p>`;
 document.getElementById("stats").innerHTML=html;
}

function exportLast(){
 const g=getGames();
 if(!g.length)return;
 const game=g[g.length-1];
 const box=document.getElementById("exportBox");
 box.innerHTML=`<img src="logo.png" class="logo"><h2>Ultima partita</h2>`;
 let t="<table><tr><th>Giocatore</th><th>Risultato</th></tr>";
 players.forEach(p=>{
   const d=game.players[p.n];
   if(!d.present)t+=`<tr class="absent"><td>${p.n}</td><td>—</td></tr>`;
   else t+=`<tr><td>${p.n}</td><td>${d.score}</td></tr>`;
 });
 t+="</table>";
 box.innerHTML+=t;
 html2canvas(box,{scale:2}).then(c=>{
   const a=document.createElement("a");
   a.download="ultima_partita.png";
   a.href=c.toDataURL();
   a.click();
 });
}

function exportAll(){
 const box=document.getElementById("exportBox");
 const clone=document.getElementById("gamesTable").cloneNode(true);
 clone.style.width="max-content";
 box.innerHTML=`<img src="logo.png" class="logo"><h2>Tutte le partite</h2>`;
 box.appendChild(clone);
 html2canvas(box,{
   scale:2,
   width:clone.scrollWidth,
   windowWidth:clone.scrollWidth
 }).then(c=>{
   const a=document.createElement("a");
   a.download="tutte_le_partite.png";
   a.href=c.toDataURL();
   a.click();
 });
}

players.forEach(p=>{
 const o=document.createElement("option");
 o.value=p.n;
 o.textContent=p.n;
 document.getElementById("playerFilter").appendChild(o);
});

render();
</script>

</body>
</html>
