<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Home Game</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  margin:0;
  padding:20px;
}

h1,h2{
  text-align:center;
}

button{
  padding:8px 12px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.green{ color:#00ff88; }
.red{ color:#ff4d4d; }
.assente{ opacity:0.4; }

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
  font-size:14px;
}

th,td{
  border:1px solid #333;
  padding:6px;
  text-align:center;
}

th{
  background:#222;
}

input{
  width:70px;
  padding:4px;
}
</style>
</head>

<body>

<h1>POKER HOME GAME</h1>
<h2 id="seasonTitle"></h2>

<button onclick="resetSeason()">Reset Stagione</button>

<h2>Nuova Partita</h2>
<div id="inputs"></div>
<button onclick="saveGame()">Salva Partita</button>

<h2>Classifica</h2>
<div id="leaderboard"></div>

<h2>Partite Registrate</h2>
<div id="gamesList"></div>

<h2>Statistiche</h2>
<select id="playerFilter" onchange="loadStats()">
  <option value="all">Generali</option>
</select>
<div id="stats"></div>

<script>

const supabase = window.supabase.createClient(
"https://mukmsgqryxjxbmthasox.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11a21zZ3FyeXhqeGJtdGhhc294Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjYwNjYsImV4cCI6MjA4ODEwMjA2Nn0.B88aCDYtbF5SKBe6xTP0TnaqtHGznTA4AEsFd75CZM8"
);

let currentSeason = null;
let players = [];

async function init(){
  await loadSeason();
  await loadPlayers();
  renderInputs();
  await loadAll();
}

async function loadSeason(){
  const { data } = await supabase
    .from("seasons")
    .select("*")
    .eq("active", true)
    .single();

  currentSeason = data;
  document.getElementById("seasonTitle").innerText = data.name;
}

async function loadPlayers(){
  const { data } = await supabase.from("players").select("*");
  players = data;

  const select = document.getElementById("playerFilter");
  players.forEach(p=>{
    let opt=document.createElement("option");
    opt.value=p.id;
    opt.text=p.name;
    select.appendChild(opt);
  });
}

function renderInputs(){
  const div = document.getElementById("inputs");
  div.innerHTML="";
  players.forEach(p=>{
    div.innerHTML+=`
      <div>
        ${p.name}
        <input type="number" id="score_${p.id}" placeholder="">
      </div>
    `;
  });
}

async function saveGame(){
  let total=0;
  let results=[];

  players.forEach(p=>{
    let val=document.getElementById("score_"+p.id).value;
    if(val==="") return;
    let num=parseFloat(val);
    total+=num;
    results.push({player_id:p.id, score:num});
  });

  if(total!==0){
    alert("La somma deve essere 0");
    return;
  }

  const { data:game } = await supabase
    .from("games")
    .insert({season_id:currentSeason.id})
    .select()
    .single();

  for(let r of results){
    await supabase.from("game_results").insert({
      game_id:game.id,
      player_id:r.player_id,
      score:r.score,
      present:true
    });
  }

  renderInputs();
  loadAll();
}

async function loadAll(){
  await loadLeaderboard();
  await loadGames();
  await loadStats();
}

async function loadLeaderboard(){
  const { data } = await supabase
  .from("game_results")
  .select("score, players(name), games(season_id)")
  .eq("games.season_id", currentSeason.id);

  let totals={};

  data.forEach(r=>{
    let name=r.players.name;
    if(!totals[name]) totals[name]=0;
    totals[name]+=r.score;
  });

  let arr=Object.entries(totals).sort((a,b)=>b[1]-a[1]);

  let html="<table><tr><th>Giocatore</th><th>Totale</th></tr>";
  arr.forEach(r=>{
    html+=`<tr>
    <td>${r[0]}</td>
    <td class="${r[1]>=0?'green':'red'}">${r[1]}</td>
    </tr>`;
  });
  html+="</table>";

  document.getElementById("leaderboard").innerHTML=html;
}

async function loadGames(){
  const { data:games } = await supabase
  .from("games")
  .select("*")
  .eq("season_id", currentSeason.id)
  .order("date",{ascending:false});

  let html="";

  for(let g of games){
    const { data:res } = await supabase
    .from("game_results")
    .select("score, players(name)")
    .eq("game_id", g.id);

    html+=`<h4>${new Date(g.date).toLocaleDateString()}</h4>`;
    html+="<table><tr><th>Giocatore</th><th>Risultato</th></tr>";

    res.forEach(r=>{
      html+=`<tr>
      <td>${r.players.name}</td>
      <td class="${r.score>=0?'green':'red'}">${r.score}</td>
      </tr>`;
    });

    html+="</table>";
  }

  document.getElementById("gamesList").innerHTML=html;
}

async function loadStats(){
  const filter=document.getElementById("playerFilter").value;

  let query=supabase
  .from("game_results")
  .select("score, players(name), games(season_id)")
  .eq("games.season_id", currentSeason.id);

  if(filter!=="all"){
    query=query.eq("player_id", filter);
  }

  const { data } = await query;

  if(!data.length){
    document.getElementById("stats").innerHTML="Nessun dato";
    return;
  }

  let best=data.reduce((a,b)=>a.score>b.score?a:b);
  let worst=data.reduce((a,b)=>a.score<b.score?a:b);
  let avg=data.reduce((sum,r)=>sum+r.score,0)/data.length;

  document.getElementById("stats").innerHTML=`
    Media: ${avg.toFixed(2)} <br>
    Miglior serata: ${best.players.name} ${best.score} <br>
    Peggior serata: ${worst.players.name} ${worst.score}
  `;
}

async function resetSeason(){
  if(!confirm("Chiudere stagione e crearne una nuova?")) return;

  await supabase.from("seasons").update({active:false}).eq("id", currentSeason.id);

  const year=new Date().getFullYear()+1;

  await supabase.from("seasons").insert({
    name:"Stagione "+year,
    active:true
  });

  location.reload();
}

init();

</script>
</body>
</html>
