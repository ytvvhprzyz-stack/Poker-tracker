<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinica Assenteisti Poker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body{margin:0;font-family:Inter;background:#0f172a;color:#e5e7eb}
h1{text-align:center;margin:20px}
.container{max-width:960px;margin:auto;padding:16px}
.card{background:#020617;border-radius:16px;padding:16px;margin-bottom:20px}
.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.player{text-align:center;border:1px solid #1e293b;border-radius:14px;padding:10px}
.player img{width:70px;height:70px;border-radius:50%;object-fit:cover}
.player input{width:70px;padding:6px;border-radius:8px;border:none;margin-top:6px;text-align:center}
button{border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer}
.green{background:#22c55e;color:#022c22}
.red{background:#ef4444;color:#fff}
.gray{background:#334155;color:#e5e7eb}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;text-align:center}
th{background:#020617}
tr:nth-child(even){background:#020617}
.pos{color:#22c55e;font-weight:700}
.neg{color:#ef4444;font-weight:700}
</style>
</head>

<body>
<h1>♠ Clinica Assenteisti Poker</h1>
<div class="container">

<div class="card">
<h3>Nuova partita</h3>
<div class="players" id="players"></div>
<br>
<button class="green" onclick="saveGame()">Salva partita</button>
</div>

<div class="card">
<h3>Importa partite</h3>
<textarea id="importText" style="width:100%;height:120px"></textarea><br><br>
<button class="gray" onclick="importGames()">Importa</button>
</div>

<div class="card" id="exportArea">
<h3>Classifica generale</h3>
<table id="ranking"></table>
</div>

<div class="card">
<h3>Partite registrate</h3>
<table id="games"></table>
</div>

<div class="card">
<h3>📤 Esporta</h3>
<button class="gray" onclick="exportLastImage()">Scarica immagine ultima partita</button>
<button class="gray" onclick="exportAll()">Esporta tutte le partite</button>
</div>

</div>

<script>
const players=[
 {name:"Chirurgo",img:"chirurgo.png.jpg"},
 {name:"Professore",img:"professore.jpg"},
 {name:"Barellista",img:"barellista.jpg"},
 {name:"Anestesista",img:"anestesista.png.jpg"},
 {name:"Radiografo",img:"radiografo.jpg"},
 {name:"Caposala",img:"caposala.jpg"}
];

let games=JSON.parse(localStorage.getItem("games")||"[]");

function renderPlayers(){
 document.getElementById("players").innerHTML=
 players.map(p=>`
  <div class="player">
   <img src="${p.img}">
   <div>${p.name}</div>
   <input type="number" value="0" id="inp-${p.name}">
  </div>`).join("");
}

function saveGame(){
 let g={date:new Date().toLocaleString(),scores:{}};
 players.forEach(p=>g.scores[p.name]=Number(document.getElementById("inp-"+p.name).value||0));
 games.push(g);
 localStorage.setItem("games",JSON.stringify(games));
 renderAll();
}

function importGames(){
 let t=document.getElementById("importText").value.trim().split("\n");
 t.forEach(r=>{
  let g={date:new Date().toLocaleString(),scores:{}};
  players.forEach(p=>g.scores[p.name]=0);
  r.split(",").forEach(x=>{
   let [n,v]=x.split(":");
   if(n&&v)g.scores[n.trim()]=Number(v);
  });
  games.push(g);
 });
 localStorage.setItem("games",JSON.stringify(games));
 renderAll();
}

function totals(){
 let t={};players.forEach(p=>t[p.name]=0);
 games.forEach(g=>players.forEach(p=>t[p.name]+=g.scores[p.name]));
 return t;
}

function renderRanking(){
 let t=totals();
 document.getElementById("ranking").innerHTML=
 `<tr>${players.map(p=>`<th>${p.name}</th>`).join("")}</tr>
  <tr>${players.map(p=>{
   let v=t[p.name];
   return `<td class="${v>=0?'pos':'neg'}">${v}</td>`;
  }).join("")}</tr>`;
}

function renderGames(){
 document.getElementById("games").innerHTML=
 `<tr><th>Data</th>${players.map(p=>`<th>${p.name}</th>`).join("")}<th></th></tr>`+
 games.map((g,i)=>`
  <tr>
   <td>${g.date}</td>
   ${players.map(p=>`<td>${g.scores[p.name]}</td>`).join("")}
   <td><button class="red" onclick="del(${i})">X</button></td>
  </tr>`).join("");
}

function del(i){
 games.splice(i,1);
 localStorage.setItem("games",JSON.stringify(games));
 renderAll();
}

function exportLastImage(){
 html2canvas(document.getElementById("exportArea")).then(c=>{
  let a=document.createElement("a");
  a.download="ultima_partita.png";
  a.href=c.toDataURL();
  a.click();
 });
}

function exportAll(){
 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([JSON.stringify(games,null,2)],{type:"application/json"}));
 a.download="storico_partite.json";
 a.click();
}

function renderAll(){
 renderRanking();
 renderGames();
}

renderPlayers();
renderAll();
</script>
</body>
</html>
