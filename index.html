<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Poker Stagione 2026</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#111;color:white;padding:20px}
h1{color:#00ffcc}
table{border-collapse:collapse;margin-top:10px;width:100%}
th,td{border:1px solid #333;padding:6px;text-align:center}
th{background:#222}
input{width:70px;padding:4px;background:#222;color:white;border:1px solid #444}
button{padding:8px 12px;margin:5px;background:#00ffcc;border:none;cursor:pointer}
.green{color:#00ff88;font-weight:bold}
.red{color:#ff4444;font-weight:bold}
.badge{background:gold;color:black;padding:2px 6px;border-radius:6px;font-size:12px}
.notplayed{opacity:0.4}
</style>

</head>
<body>

<h1>Stagione 2026</h1>

<div id="newGame"></div>
<button onclick="saveGame()">Salva Partita</button>
<button onclick="resetSeason()">Reset Stagione</button>

<h2>Classifica Generale</h2>
<div id="leaderboard"></div>

<h2>Statistiche</h2>
<select id="playerFilter" onchange="loadStats()">
<option value="all">Tutti</option>
</select>
<div id="stats"></div>

<script>

const { createClient } = supabase;

const client = createClient(
"https://mukmsgqryxjxbmthasox.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11a21zZ3FyeXhqeGJtdGhhc294Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjYwNjYsImV4cCI6MjA4ODEwMjA2Nn0.B88aCDYtbF5SKBe6xTP0TnaqtHGznTA4AEsFd75CZM8"
);

let players=[];
let seasonId=null;

init();

async function init(){

  const { data: season } = await client
    .from("seasons")
    .select("*")
    .eq("name","2026")
    .single();

  if(!season){
    const { data } = await client
      .from("seasons")
      .insert({name:"2026"})
      .select()
      .single();
    seasonId=data.id;
  }else{
    seasonId=season.id;
  }

  await loadPlayers();
  renderNewGame();
  loadLeaderboard();
  loadStats();
}

async function loadPlayers(){
  const { data } = await client.from("players").select("*");

  if(!data.length){
    await client.from("players").insert([
      {name:"Chirurgo"},
      {name:"Anestesista"},
      {name:"Professore"},
      {name:"Avvocato"},
      {name:"Commercialista"},
      {name:"Ingegnere"}
    ]);
  }

  const { data: playersData } = await client.from("players").select("*");
  players=playersData;

  players.forEach(p=>{
    document.getElementById("playerFilter").innerHTML+=
      `<option value="${p.id}">${p.name}</option>`;
  });
}

function renderNewGame(){
  let html="<table><tr>";
  players.forEach(p=>{
    html+=`<th>${p.name}</th>`;
  });
  html+="</tr><tr>";

  players.forEach(p=>{
    html+=`<td><input type="number" id="p${p.id}" placeholder=""></td>`;
  });

  html+="</tr></table>";
  document.getElementById("newGame").innerHTML=html;
}

async function saveGame(){

  let total=0;
  let values=[];

  players.forEach(p=>{
    let val=document.getElementById("p"+p.id).value;
    if(val==="") return;
    val=parseFloat(val);
    total+=val;
    values.push({player_id:p.id,score:val});
  });

  if(total!==0){
    alert("La somma deve essere 0");
    return;
  }

  const { data: game } = await client
    .from("games")
    .insert({season_id:seasonId})
    .select()
    .single();

  for(let v of values){
    await client.from("game_results").insert({
      game_id:game.id,
      player_id:v.player_id,
      score:v.score
    });
  }

  renderNewGame();
  loadLeaderboard();
  loadStats();
}

async function loadLeaderboard(){

  const { data: games } = await client
    .from("games")
    .select("id")
    .eq("season_id",seasonId);

  if(!games.length){
    document.getElementById("leaderboard").innerHTML="Nessuna partita";
    return;
  }

  const ids=games.map(g=>g.id);

  const { data } = await client
    .from("game_results")
    .select("score, players(name)")
    .in("game_id",ids);

  let totals={};

  data.forEach(r=>{
    if(!totals[r.players.name]) totals[r.players.name]=0;
    totals[r.players.name]+=r.score;
  });

  let arr=Object.entries(totals).sort((a,b)=>b[1]-a[1]);

  let html="<table><tr><th>Giocatore</th><th>Totale</th></tr>";

  arr.forEach((r,i)=>{
    html+=`<tr>
      <td>${r[0]} ${i===0?'<span class="badge">Vincitore</span>':''}</td>
      <td class="${r[1]>=0?'green':'red'}">${r[1]}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("leaderboard").innerHTML=html;
}

async function loadStats(){

  const filter=document.getElementById("playerFilter").value;

  const { data: games } = await client
    .from("games")
    .select("id")
    .eq("season_id",seasonId);

  if(!games.length){
    document.getElementById("stats").innerHTML="Nessun dato";
    return;
  }

  const ids=games.map(g=>g.id);

  let query=client
    .from("game_results")
    .select("score, players(name)")
    .in("game_id",ids);

  if(filter!=="all"){
    query=query.eq("player_id",filter);
  }

  const { data } = await query;

  if(!data.length){
    document.getElementById("stats").innerHTML="Nessun dato";
    return;
  }

  let best=data.reduce((a,b)=>a.score>b.score?a:b);
  let worst=data.reduce((a,b)=>a.score<b.score?a:b);
  let avg=data.reduce((s,r)=>s+r.score,0)/data.length;

  document.getElementById("stats").innerHTML=
  `Media: ${avg.toFixed(2)}<br>
   Miglior serata: ${best.players.name} ${best.score}<br>
   Peggior serata: ${worst.players.name} ${worst.score}`;
}

async function resetSeason(){
  if(!confirm("Sei sicuro di voler resettare la stagione?")) return;

  const { data: games } = await client
    .from("games")
    .select("id")
    .eq("season_id",seasonId);

  for(let g of games){
    await client.from("game_results").delete().eq("game_id",g.id);
    await client.from("games").delete().eq("id",g.id);
  }

  loadLeaderboard();
  loadStats();
}

</script>

</body>
</html>
