<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Clinica Assenteisti – Poker</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0f172a;color:#e5e7eb;font-family:Arial,sans-serif;max-width:800px;margin:auto;padding:15px;padding-bottom:50px;}
h1,h2{text-align:center;margin-bottom:15px;}
.logo{display:block;margin:0 auto 10px;max-width:100px}

button{padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;transition:0.2s;}
button:active{transform:scale(0.95);}
.save{background:#22c55e;color:#000;width:100%;margin-top:15px;font-size:1rem;}
.edit-btn{background:#eab308;color:#000;font-size:0.7rem;padding:5px 8px;border-radius:5px;}

.players{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.player{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:10px;text-align:center;}
.player img{width:50px;height:50px;border-radius:50%;object-fit:cover;margin-bottom:5px;}
.player input{width:70%;background:#0f172a;border:1px solid #475569;color:#fff;text-align:center;padding:8px;border-radius:6px;font-size:1rem;}

.card{background:#1e293b;padding:15px;border-radius:15px;margin-bottom:20px;border:1px solid #334155;}
.table-wrap{overflow-x:auto;border-radius:10px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th,td{padding:10px 5px;text-align:center;border-bottom:1px solid #334155;}
th{background:#334155;color:#94a3b8;}

.pos{color:#22c55e;font-weight:bold}
.neg{color:#ef4444;font-weight:bold}
#chartContainer{height:300px;margin-top:10px;}
</style>
</head>

<body>

<img src="logo.png" class="logo">
<h1>Clinica Assenteisti</h1>

<div class="card">
  <h2>Nuova Partita</h2>
  <div class="players" id="players"></div>
  <button id="btnSave" class="save" onclick="saveGame()">SALVA PARTITA 🎲</button>
</div>

<div class="card">
  <h2>Classifica Generale</h2>
  <div id="ranking"></div>
</div>

<div class="card">
  <h2>Andamento Temporale</h2>
  <div id="chartContainer">
    <canvas id="pokerChart"></canvas>
  </div>
</div>

<div class="card">
  <h2>Storico Partite</h2>
  <div class="table-wrap" id="gamesTable"></div>
</div>

<script>
const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxjaN0VerPlweGNh1hmH4U26IeKAcEno3srRNxh1WWydndq5bP7WXyh9RXr-aXEYHTM/exec";

const players = [
 {name:"Anestesista", color:"#38bdf8"},
 {name:"Chirurgo", color:"#fb7185"},
 {name:"Barellista", color:"#fbbf24"},
 {name:"Professore", color:"#a78bfa"},
 {name:"Caposala", color:"#22c55e"},
 {name:"Radiografo", color:"#f472b6"}
];

let games = [];
let pokerChart = null;

// Init giocatori
const box = document.getElementById("players");
players.forEach(p => {
  box.innerHTML += `
  <div class="player" data-name="${p.name}">
   <img src="${p.name.toLowerCase()}.jpg" onerror="this.src='logo.png'">
   <div><b>${p.name}</b></div>
   <input type="number" class="score" placeholder="0" inputmode="numeric">
  </div>`;
});

async function loadGames() {
  try {
    const resp = await fetch(GOOGLE_URL);
    games = await resp.json();
    renderAll();
  } catch (e) { console.log("Errore caricamento"); }
}

async function saveGame() {
  const g = { date: new Date().toLocaleString('it-IT'), scores: {} };
  let total = 0, count = 0;

  document.querySelectorAll(".player").forEach(p => {
    const n = p.dataset.name, val = p.querySelector(".score").value;
    if(val !== "") {
      const s = Number(val); total += s; count++;
      g.scores[n] = s;
    }
  });

  if(count === 0) return alert("Inserisci dati!");
  if(total !== 0) return alert("La somma deve essere 0! Attuale: " + total);

  const btn = document.getElementById("btnSave");
  btn.disabled = true; btn.innerText = "Invio...";

  await fetch(GOOGLE_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(g) });
  
  document.querySelectorAll(".score").forEach(i => i.value = "");
  btn.disabled = false; btn.innerText = "SALVA PARTITA 🎲";
  setTimeout(loadGames, 1500);
}

function renderAll() {
  renderRanking();
  renderGamesTable();
  updateChart();
}

function renderRanking() {
  const tot = {}; players.forEach(p => tot[p.name] = 0);
  games.forEach(g => { for (const n in g.scores) if(g.scores[n]) tot[n] += Number(g.scores[n]); });
  const sorted = Object.entries(tot).sort((a,b) => b[1] - a[1]);
  let h = "<table>";
  sorted.forEach(([n,v], i) => {
    h += `<tr><td>${i+1}º ${n}</td><td class="${v>0?'pos':v<0?'neg':''}">${v>0?"+":""}${v}</td></tr>`;
  });
  document.getElementById("ranking").innerHTML = h + "</table>";
}

function renderGamesTable() {
  let h = "<table><tr><th>Data</th>";
  players.forEach(p => h += `<th>${p.name.substring(0,3)}</th>`);
  h += "</tr>";
  [...games].reverse().forEach((g) => {
    h += `<tr><td>${g.date.split(' ')[0]}</td>`;
    players.forEach(p => {
      const s = g.scores[p.name];
      h += `<td class="${s>0?'pos':s<0?'neg':''}">${s ?? '-'}</td>`;
    });
    h += "</tr>";
  });
  document.getElementById("gamesTable").innerHTML = h + "</table>";
}

function updateChart() {
  const ctx = document.getElementById('pokerChart').getContext('2d');
  const labels = games.map((_, i) => `P${i+1}`);
  
  const datasets = players.map(p => {
    let sum = 0;
    const data = games.map(g => {
      sum += (Number(g.scores[p.name]) || 0);
      return sum;
    });
    return { label: p.name, data: data, borderColor: p.color, tension: 0.3, fill: false };
  });

  if(pokerChart) pokerChart.destroy();
  pokerChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 10, font: { size: 10 } } } },
      scales: { 
        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
      }
    }
  });
}

// Avvio e auto-aggiornamento ogni 30 sec
loadGames();
setInterval(loadGames, 30000);
</script>

</body>
</html>
