<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinica Assenteisti Poker</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Inter;background:#0f172a;color:#e5e7eb}
h1{text-align:center;margin:20px}
.container{max-width:1100px;margin:auto;padding:16px}
.card{background:#020617;border-radius:16px;padding:16px;margin-bottom:20px}
.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.player{text-align:center;border:1px solid #1e293b;border-radius:14px;padding:10px}
.player img{width:70px;height:70px;border-radius:50%;object-fit:cover}
.player input{width:70px;padding:6px;border-radius:8px;border:none;margin-top:6px;text-align:center}
button{border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer}
.green{background:#22c55e;color:#022c22}
.red{background:#ef4444;color:#fff}
.gray{background:#334155;color:#e5e7eb}
table{width:100%;border-collapse:collapse}
th,td{padding:8px;text-align:center}
th{background:#020617}
tr:nth-child(even){background:#020617}
.pos{color:#22c55e;font-weight:700}
.neg{color:#ef4444;font-weight:700}
.hidden{position:absolute;left:-9999px;top:-9999px;width:1000px;background:#020617;color:#e5e7eb;padding:20px}
.logo{width:140px;margin:auto;display:block}
</style>
</head>

<body>
<h1>♠ Clinica Assenteisti Poker</h1>
<div class="container">

<div class="card">
<h3>Nuova partita</h3>
<div class="players" id="players"></div><br>
<button class="green" onclick="saveGame()">Salva partita</button>
</div>

<div class="card">
<h3>📈 Andamento</h3>
<canvas id="trendChart"></canvas>
</div>

<div class="card">
<h3>Classifica generale</h3>
<table id="ranking"></table>
</div>

<div class="card">
<h3>Partite registrate</h3>
<table id="games"></table>
</div>

<div class="card">
<h3>📤 Condivisione</h3>
<button class="gray" onclick="exportLast()">📸 Report ultima partita</button>
<button class="gray" onclick="exportAll()">📊 Storico completo</button>
</div>

</div>

<!-- AREA EXPORT ULTIMA -->
<div id="exportLastArea" class="hidden">
<img src="logo.jpg" class="logo">
<h2>Ultima partita</h2>
<div id="lastResult"></div>
<h2>Classifica generale</h2>
<table id="exportRanking"></table>
<canvas id="exportChart"></canvas>
</div>

<!-- AREA EXPORT TUTTE -->
<div id="exportAllArea" class="hidden">
<img src="logo.jpg" class="logo">
<h2>Storico partite</h2>
<table id="exportGames"></table>
</div>

<script>
const players=[
 {name:"Chirurgo",img:"chirurgo.jpg",color:"#22c55e"},
 {name:"Professore",img:"professore.jpg",color:"#38bdf8"},
 {name:"Barellista",img:"barellista.jpg",color:"#eab308"},
 {name:"Anestesista",img:"anestesista.png.jpg",color:"#ef4444"},
 {name:"Radiografo",img:"radiografo.jpg",color:"#a855f7"},
 {name:"Caposala",img:"caposala.jpg",color:"#f97316"}
];

let games=JSON.parse(localStorage.getItem("games")||"[]");
let chart;

function renderPlayers(){
 players.forEach(p=>{
  playersDiv.innerHTML+=`
  <div class="player">
   <img src="${p.img}">
   <div>${p.name}</div>
   <input type="number" value="0" id="inp-${p.name}">
  </div>`;
 });
}

function saveGame(){
 let g={date:new Date().toLocaleString(),scores:{}};
 players.forEach(p=>g.scores[p.name]=+document.getElementById("inp-"+p.name).value||0);
 games.push(g);
 localStorage.setItem("games",JSON.stringify(games));
 renderAll();
}

function totals(){
 let t={};players.forEach(p=>t[p.name]=0);
 games.forEach(g=>players.forEach(p=>t[p.name]+=g.scores[p.name]));
 return t;
}

function renderRanking(){
 let t=totals();
 ranking.innerHTML=
 `<tr>${players.map(p=>`<th>${p.name}</th>`).join("")}</tr>
  <tr>${players.map(p=>{
   let v=t[p.name];
   return `<td class="${v>=0?'pos':'neg'}">${v}</td>`;
  }).join("")}</tr>`;
 exportRanking.innerHTML=ranking.innerHTML;
}

function renderGames(){
 gamesTable=games.map((g,i)=>`
 <tr>
  <td>${g.date}</td>
  ${players.map(p=>`<td>${g.scores[p.name]}</td>`).join("")}
 </tr>`).join("");
 games.innerHTML=
 `<tr><th>Data</th>${players.map(p=>`<th>${p.name}</th>`).join("")}</tr>`+gamesTable;
 exportGames.innerHTML=games.innerHTML;
}

function renderChart(){
 let labels=games.map((_,i)=>`P${i+1}`);
 let datasets=players.map(p=>{
  let sum=0;
  return{
   label:p.name,
   data:games.map(g=>sum+=g.scores[p.name]),
   borderColor:p.color,
   fill:false
  };
 });
 if(chart)chart.destroy();
 chart=new Chart(trendChart,{type:"line",data:{labels,datasets}});
 new Chart(exportChart,{type:"line",data:{labels,datasets}});
}

function exportLast(){
 let last=games[games.length-1];
 lastResult.innerHTML=players.map(p=>{
  let v=last.scores[p.name];
  return `<p>${p.name}: <b class="${v>=0?'pos':'neg'}">${v}</b></p>`;
 }).join("");
 html2canvas(exportLastArea).then(c=>{
  let a=document.createElement("a");
  a.download="report_ultima_partita.png";
  a.href=c.toDataURL();
  a.click();
 });
}

function exportAll(){
 html2canvas(exportAllArea).then(c=>{
  let a=document.createElement("a");
  a.download="storico_partite.png";
  a.href=c.toDataURL();
  a.click();
 });
}

function renderAll(){
 renderRanking();
 renderGames();
 renderChart();
}

renderPlayers();
renderAll();
</script>
</body>
</html>
