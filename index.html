<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>Clinica Assenteisti Poker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:linear-gradient(180deg,#020617,#0f172a);
color:white;
font-family:system-ui;
max-width:1100px;
margin:auto;
padding:20px
}

h1{text-align:center}

.logo{
display:block;
margin:auto;
width:140px;
margin-bottom:10px
}

.card{
background:#020617;
border:1px solid #334155;
border-radius:12px;
padding:15px;
margin-bottom:20px
}

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px
}

.player{
background:#020617;
border:1px solid #334155;
border-radius:10px;
padding:10px;
text-align:center
}

.player img{
width:55px;
height:55px;
border-radius:50%;
object-fit:cover;
margin-bottom:5px
}

.player input{
width:80px;
padding:6px;
text-align:center;
border-radius:6px;
border:none;
font-size:16px
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin:5px
}

.save{
background:#22c55e;
color:black
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px
}

th{
background:#1e293b;
padding:6px
}

td{
padding:6px;
border-top:1px solid #334155;
text-align:center
}

.pos{color:#22c55e;font-weight:bold}
.neg{color:#ef4444;font-weight:bold}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<h1>Clinica Assenteisti</h1>

<div class="card">

<h2>Nuova partita</h2>

<div class="players" id="players"></div>

<div style="text-align:center;margin-top:15px">
<button class="save" onclick="saveGame()">Salva partita</button>
</div>

</div>

<div class="card">

<h2>Classifica</h2>

<div id="ranking"></div>

</div>

<div class="card">

<h2>Storico partite</h2>

<div id="gamesTable"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz9dd0kPsH9LfpysTBHAz3gKxCFt-i9s9Zpfmzxi0VDFGoxtiEmAGETy08owwyygNvs/exec"

const players=[

{name:"Anestesista",img:"anestesista.png.jpg"},
{name:"Chirurgo",img:"chirurgo.jpg"},
{name:"Barellista",img:"barellista.jpg"},
{name:"Professore",img:"professore.jpg"},
{name:"Caposala",img:"caposala.jpg"},
{name:"Radiografo",img:"radiografo.jpg"}

]

const box=document.getElementById("players")

players.forEach(p=>{

box.innerHTML+=`

<div class="player" data-name="${p.name}">

<img src="${p.img}">

<div>${p.name}</div>

<input type="number" class="score">

</div>

`

})

let games=[]

async function loadGames(){

try{

const res=await fetch(API)

const data=await res.json()

games=[]

data.forEach(r=>{

games.push({

date:r[1],

players:{
Anestesista:Number(r[2]),
Chirurgo:Number(r[3]),
Barellista:Number(r[4]),
Professore:Number(r[5]),
Caposala:Number(r[6]),
Radiografo:Number(r[7])
}

})

})

renderAll()

}catch(e){

alert("Errore caricamento dati")

}

}

async function saveGame(){

let g={}
let total=0

document.querySelectorAll(".player").forEach(p=>{

const name=p.dataset.name
const v=p.querySelector("input").value

g[name]=Number(v||0)

total+=Number(v||0)

})

if(total!==0){

alert("La somma deve essere 0")

return

}

try{

await fetch(API,{
method:"POST",
body:JSON.stringify(g)
})

alert("Partita salvata")

document.querySelectorAll("input").forEach(i=>i.value="")

loadGames()

}catch(e){

alert("Errore salvataggio")

}

}

function renderRanking(){

let tot={}

players.forEach(p=>tot[p.name]=0)

games.forEach(g=>{

for(const n in g.players){

tot[n]+=g.players[n]

}

})

let sorted=Object.entries(tot).sort((a,b)=>b[1]-a[1])

let html="<table><tr><th>Giocatore</th><th>Totale</th></tr>"

sorted.forEach(([n,v])=>{

html+=`<tr>

<td>${n}</td>

<td class="${v>=0?'pos':'neg'}">${v}</td>

</tr>`

})

html+="</table>"

ranking.innerHTML=html

}

function renderGames(){

let html="<table><tr><th>#</th>"

players.forEach(p=>html+=`<th>${p.name}</th>`)

html+="</tr>"

games.forEach((g,i)=>{

html+=`<tr><td>${i+1}</td>`

players.forEach(p=>{

html+=`<td>${g.players[p.name]}</td>`

})

html+="</tr>"

})

html+="</table>"

gamesTable.innerHTML=html

}

function renderAll(){

renderRanking()
renderGames()

}

loadGames()

</script>

</body>

</html>
