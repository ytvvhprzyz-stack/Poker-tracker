<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinica Assenteisti – Poker</title>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;background:#0f172a;color:#f8fafc}
header{text-align:center;padding:16px}
header img{width:140px;border-radius:16px}
.card{background:#020617;margin:10px;padding:14px;border-radius:16px}
h2{margin-top:0}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:6px;text-align:center}
th{color:#94a3b8}
.pos{color:#22c55e;font-weight:700}
.neg{color:#ef4444;font-weight:700}
.badge{background:#7c2d12;color:#fff;padding:2px 6px;border-radius:6px;font-size:11px;margin-left:4px}
select,button,input{width:100%;padding:8px;border-radius:10px;border:none;margin-top:6px}
button{background:#2563eb;color:#fff;font-size:16px}
button.danger{background:#dc2626}
button.small{font-size:12px;padding:4px 6px}
canvas{display:none}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>Clinica Assenteisti</h1>
</header>

<div class="card">
<h2>Nuova partita</h2>
<div id="inputs"></div>
<button onclick="saveGame()">Salva partita</button>
</div>

<div class="card">
<h2>Filtro giocatore</h2>
<select id="playerFilter" onchange="renderAll()">
<option value="ALL">Tutti</option>
</select>
</div>

<div class="card">
<h2>Statistiche personali</h2>
<div id="stats">Seleziona un giocatore</div>
</div>

<div class="card">
<h2>Classifica generale</h2>
<table id="leaderboard"></table>
</div>

<div class="card">
<h2>Partite registrate</h2>
<table id="gamesTable"></table>
</div>

<div class="card">
<button onclick="exportImage()">📸 Scarica immagine serata</button>
</div>

<canvas id="canvas" width="1080" height="1600"></canvas>

<script>
const players=["Chirurgo","Professore","Barellista","Anestesista","Radiografo","Caposala"];
const inputs=document.getElementById("inputs");
const filter=document.getElementById("playerFilter");

players.forEach(p=>{
  inputs.innerHTML+=`<label>${p}</label><input type="number" id="in_${p}" value="0">`;
  filter.innerHTML+=`<option value="${p}">${p}</option>`;
});

let games=JSON.parse(localStorage.getItem("games")||"[]");

function saveGame(){
  let g={date:new Date().toLocaleDateString(),values:{}};
  let sum=0;
  players.forEach(p=>{
    let v=parseInt(document.getElementById("in_"+p).value)||0;
    g.values[p]=v;
    sum+=v;
    document.getElementById("in_"+p).value=0;
  });
  if(sum!==0){alert("La somma deve essere 0");return;}
  games.push(g);
  persist();
}

function persist(){
  localStorage.setItem("games",JSON.stringify(games));
  renderAll();
}

function renderAll(){
  renderLeaderboard();
  renderGames();
  renderStats();
}

function renderLeaderboard(){
  let totals={}; players.forEach(p=>totals[p]=0);
  games.forEach(g=>players.forEach(p=>totals[p]+=g.values[p]));
  let html="<tr><th>Giocatore</th><th>Totale €</th></tr>";
  Object.entries(totals).sort((a,b)=>b[1]-a[1]).forEach(([p,v],i)=>{
    html+=`<tr><td>${i===0?"🏆 ":""}${p}</td><td class="${v>=0?"pos":"neg"}">${v}</td></tr>`;
  });
  leaderboard.innerHTML=html;
}

function renderGames(){
  let f=filter.value;
  let html="<tr><th>Data</th>";
  players.forEach(p=>html+=`<th>${p}</th>`);
  html+="<th>Azioni</th></tr>";

  games.forEach((g,i)=>{
    if(f!=="ALL" && g.values[f]===0) return;
    html+=`<tr><td>${g.date}</td>`;
    players.forEach(p=>{
      let v=g.values[p];
      html+=`<td class="${v>=0?"pos":"neg"}">${v}</td>`;
    });
    html+=`<td>
      <button class="small" onclick="editGame(${i})">✏️</button>
      <button class="small danger" onclick="deleteGame(${i})">🗑️</button>
    </td></tr>`;
  });
  gamesTable.innerHTML=html;
}

function editGame(i){
  let g=games[i];
  players.forEach(p=>{
    document.getElementById("in_"+p).value=g.values[p];
  });
  games.splice(i,1);
  persist();
}

function deleteGame(i){
  if(confirm("Eliminare la partita?")){
    games.splice(i,1);
    persist();
  }
}

function renderStats(){
  let f=filter.value;
  if(f==="ALL"){stats.innerHTML="Seleziona un giocatore";return;}
  let played=0,total=0,worst=0;
  games.forEach(g=>{
    let v=g.values[f];
    if(v!==0){played++;total+=v;worst=Math.min(worst,v);}
  });
  stats.innerHTML=`
  <p>Partite giocate: <b>${played}</b></p>
  <p>Saldo totale: <b class="${total>=0?"pos":"neg"}">${total} €</b></p>
  <p>Peggior serata: <b class="neg">${worst} €</b> <span class="badge">💀</span></p>`;
}

function exportImage(){
  if(!games.length){alert("Nessuna partita");return;}
  const c=document.getElementById("canvas");
  const ctx=c.getContext("2d");
  ctx.fillStyle="#020617";ctx.fillRect(0,0,c.width,c.height);

  ctx.fillStyle="white";
  ctx.font="bold 56px Arial";
  ctx.fillText("Clinica Assenteisti",60,80);
  ctx.font="36px Arial";
  ctx.fillText("Risultati ultima serata",60,140);

  const last=games[games.length-1];
  let y=220;
  let max=Math.max(...Object.values(last.values));

  players.forEach(p=>{
    let v=last.values[p];
    ctx.fillStyle=v>=0?"#22c55e":"#ef4444";
    ctx.font=v===max?"bold 32px Arial":"30px Arial";
    ctx.fillText(p+": "+v+" €"+(v===max?" 🏆":""),60,y);
    y+=44;
  });

  y+=40;
  ctx.fillStyle="white";
  ctx.font="bold 36px Arial";
  ctx.fillText("Classifica generale",60,y);
  y+=50;

  let totals={}; players.forEach(p=>totals[p]=0);
  games.forEach(g=>players.forEach(p=>totals[p]+=g.values[p]));
  Object.entries(totals).sort((a,b)=>b[1]-a[1]).forEach(([p,v],i)=>{
    ctx.fillStyle=v>=0?"#22c55e":"#ef4444";
    ctx.font=i===0?"bold 32px Arial":"30px Arial";
    ctx.fillText((i===0?"🏆 ":"")+p+" "+v+" €",60,y);
    y+=42;
  });

  const a=document.createElement("a");
  a.download="clinica-assenteisti-serata.png";
  a.href=c.toDataURL("image/png");
  a.click();
}

renderAll();
</script>

</body>
</html>
