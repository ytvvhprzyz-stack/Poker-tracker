<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Poker Clinica Assenteisti</title>

<style>

body{
background:#0f172a;
color:white;
font-family:system-ui;
max-width:900px;
margin:auto;
padding:20px
}

h1{text-align:center}

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:10px;
margin-top:20px
}

.player{
background:#020617;
border:1px solid #334155;
border-radius:8px;
padding:10px;
text-align:center
}

input{
width:70px;
padding:5px;
text-align:center
}

button{
padding:10px;
margin-top:15px;
background:#22c55e;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px
}

th,td{
border:1px solid #334155;
padding:6px;
text-align:center
}

.pos{color:#22c55e}
.neg{color:#ef4444}
.ass{color:#64748b;font-style:italic}

</style>

</head>

<body>

<h1>Clinica Assenteisti</h1>

<div class="players" id="players"></div>

<div style="text-align:center">
<button onclick="saveGame()">Salva partita</button>
</div>

<h2>Classifica</h2>
<div id="ranking"></div>

<h2>Storico</h2>
<div id="games"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbz9dd0kPsH9LfpysTBHAz3gKxCFt-i9s9Zpfmzxi0VDFGoxtiEmAGETy08owwyygNvs/exec"

const players=[
"Anestesista",
"Chirurgo",
"Barellista",
"Professore",
"Caposala",
"Radiografo"
]

const playersBox=document.getElementById("players")

players.forEach(p=>{
playersBox.innerHTML+=`
<div class="player" data-name="${p}">
<div>${p}</div>
<input type="number">
</div>`
})

let games=[]

async function loadGames(){

const res=await fetch(API)
const data=await res.json()

games=[]

data.forEach(r=>{

games.push({

players:{
Anestesista:r[2]===""?null:Number(r[2]),
Chirurgo:r[3]===""?null:Number(r[3]),
Barellista:r[4]===""?null:Number(r[4]),
Professore:r[5]===""?null:Number(r[5]),
Caposala:r[6]===""?null:Number(r[6]),
Radiografo:r[7]===""?null:Number(r[7])
}

})

})

render()

}

async function saveGame(){

let g={}
let total=0

document.querySelectorAll(".player").forEach(p=>{

const name=p.dataset.name
const v=p.querySelector("input").value

if(v===""){
g[name]=""
}else{
g[name]=Number(v)
total+=Number(v)
}

})

if(total!==0){
alert("La somma deve essere 0")
return
}

await fetch(API,{
method:"POST",
body:JSON.stringify(g)
})

document.querySelectorAll("input").forEach(i=>i.value="")

loadGames()

}

function render(){

let totals={}
players.forEach(p=>totals[p]=0)

games.forEach(g=>{
for(const n in g.players){
if(g.players[n]!==null){
totals[n]+=g.players[n]
}
}
})

let rank="<table><tr><th>Giocatore</th><th>Totale</th></tr>"

Object.entries(totals)
.sort((a,b)=>b[1]-a[1])
.forEach(([n,v])=>{

rank+=`<tr>
<td>${n}</td>
<td class="${v>=0?'pos':'neg'}">${v}</td>
</tr>`

})

rank+="</table>"

ranking.innerHTML=rank

let hist="<table><tr><th>#</th>"

players.forEach(p=>hist+=`<th>${p}</th>`)

hist+="</tr>"

games.forEach((g,i)=>{

hist+=`<tr><td>${i+1}</td>`

players.forEach(p=>{

let v=g.players[p]

if(v===null){
hist+=`<td class="ass">ASS</td>`
}else{
hist+=`<td>${v}</td>`
}

})

hist+="</tr>"

})

hist+="</table>"

games.innerHTML=hist

}

loadGames()

</script>

</body>
</html>
