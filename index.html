<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Clinica Assenteisti – Poker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  background:#0f172a;
  color:#e5e7eb;
  font-family:Arial,sans-serif;
  max-width:1200px;
  margin:auto;
  padding:20px;
}
h1,h2{text-align:center}
.logo{display:block;margin:0 auto 10px;max-width:180px}

button{
  padding:8px 14px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
  margin:4px;
}
.save{background:#22c55e;color:#000}
.export{background:#38bdf8;color:#000}

.players{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:10px;
}
.player{
  background:#020617;
  border:1px solid #334155;
  border-radius:8px;
  padding:8px;
  text-align:center;
}
.player img{
  width:60px;height:60px;
  border-radius:50%;object-fit:cover
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  font-size:14px;
}
th,td{
  border:1px solid #334155;
  padding:6px;
  text-align:center;
}
th{background:#1e293b}
.pos{color:#22c55e;font-weight:bold}
.neg{color:#ef4444;font-weight:bold}
.neu{color:#eab308;font-weight:bold}

.export-area{
  background:#0f172a;
  padding:20px;
  max-width:1000px;
  margin:auto;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">
<h1>Clinica Assenteisti</h1>

<h2>Nuova partita</h2>
<div class="players" id="players"></div>

<div style="text-align:center">
  <button class="save" onclick="saveGame()">Salva partita</button>
</div>

<h2>📈 Andamento totale</h2>
<canvas id="trendChart"></canvas>

<h2>Classifica generale</h2>
<div id="ranking"></div>

<h2>Partite (vista tabellare)</h2>
<div style="overflow-x:auto" id="gamesTable"></div>

<div style="text-align:center">
  <button class="export" onclick="exportLast()">📸 Scarica ultima partita</button>
  <button class="export" onclick="exportAll()">📸 Scarica tutte le partite</button>
</div>

<div id="exportBox" class="export-area" style="display:none"></div>

<script>
const players=[
 {name:"Anestesista",img:"anestesista.png.jpg"},
 {name:"Chirurgo",img:"chirurgo.jpg"},
 {name:"Barellista",img:"barellista.jpg"},
 {name:"Caposala",img:"caposala.jpg"},
 {name:"Radiografo",img:"radiografo.jpg"},
 {name:"Professore",img:"professore.jpg"}
];

const playersBox=document.getElementById("players");
players.forEach(p=>{
 playersBox.innerHTML+=`
 <div class="player" data-name="${p.name}">
  <img src="${p.img}">
  <div><b>${p.name}</b></div>
  <label><input type="checkbox" class="present"> Presente</label>
  <input type="number" class="score" value="0">
 </div>`;
});

let games=JSON.parse(localStorage.getItem("games")||"[]");
let chart;

function saveGame(){
 const g={date:new Date().toLocaleString(),players:{}};
 document.querySelectorAll(".player").forEach(p=>{
  const n=p.dataset.name;
  const pr=p.querySelector(".present").checked;
  const sc=Number(p.querySelector(".score").value||0);
  g.players[n]={present:pr,score:pr?sc:null};
 });
 games.push(g);
 localStorage.setItem("games",JSON.stringify(games));
 alert("✅ Partita salvata");
 renderAll();
}

function rankingHTML(){
 const tot={}; players.forEach(p=>tot[p.name]=0);
 games.forEach(g=>{
  for(const n in g.players)
   if(g.players[n].present) tot[n]+=g.players[n].score;
 });
 const sorted=Object.entries(tot).sort((a,b)=>b[1]-a[1]);
 let h="<table><tr><th>Giocatore</th><th>Totale</th></tr>";
 sorted.forEach(([n,v])=>{
  h+=`<tr><td>${n}</td><td class="${v>0?'pos':v<0?'neg':'neu'}">${v}</td></tr>`;
 });
 return h+"</table>";
}

function gamesTableHTML(){
 let h="<table><tr><th>Giocatore</th>";
 games.forEach((g,i)=>h+=`<th>P${i+1}</th>`);
 h+="</tr>";
 players.forEach(p=>{
  h+=`<tr><td>${p.name}</td>`;
  games.forEach(g=>{
   const d=g.players[p.name];
   if(!d||!d.present) h+="<td>—</td>";
   else h+=`<td class="${d.score>0?'pos':d.score<0?'neg':'neu'}">${d.score}</td>`;
  });
  h+="</tr>";
 });
 return h+"</table>";
}

function renderTrend(){
 const labels=games.map((_,i)=>`P${i+1}`);
 const data=games.map(g=>{
  let s=0;
  for(const p in g.players)
   if(g.players[p].present) s+=g.players[p].score;
  return s;
 });
 if(chart) chart.destroy();
 chart=new Chart(document.getElementById("trendChart"),{
  type:"line",
  data:{labels,datasets:[{label:"Andamento totale",data,borderColor:"#38bdf8"}]},
  options:{responsive:true}
 });
}

function exportPNG(name,html){
 const box=document.getElementById("exportBox");
 box.innerHTML=`<img src="logo.png" class="logo">${html}`;
 box.style.display="block";
 html2canvas(box,{backgroundColor:"#0f172a"}).then(c=>{
  const a=document.createElement("a");
  a.download=name;
  a.href=c.toDataURL("image/png");
  a.click();
  box.style.display="none";
 });
}

function exportLast(){
 if(!games.length)return alert("Nessuna partita");
 exportPNG(
  "ultima_partita.png",
  "<h2>Ultima partita</h2>"+rankingHTML()
 );
}

function exportAll(){
 exportPNG(
  "tutte_le_partite.png",
  "<h2>Tutte le partite</h2>"+gamesTableHTML()
 );
}

function renderAll(){
 ranking.innerHTML=rankingHTML();
 gamesTable.innerHTML=gamesTableHTML();
 renderTrend();
}

renderAll();
</script>

</body>
</html>
